user  root;
worker_processes  auto;
worker_rlimit_nofile  65535;

pid /usr/local/openresty/nginx/logs/nginx.pid;
error_log /usr/local/openresty/nginx/logs/error.log warn;

events {
    worker_connections  65535;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server_tokens off;                    # don't expose nginx version
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # client / proxy tuning
    client_max_body_size 20m;
    client_body_buffer_size 128k;

    proxy_http_version 1.1;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    proxy_request_buffering on;           # enable or disable depending on backend needs
    proxy_set_header Connection "";       # let lua/proxy_set_header override for websockets
    proxy_set_header Proxy "";

    resolver 8.8.8.8 valid=30s;
    resolver_timeout 5s;

    # gzip
    gzip on;
    gzip_http_version 1.1;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # security headers (tweak as needed; HSTS only when using TLS)
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # rate limiting + connection limiting (basic)
    limit_req_zone $binary_remote_addr zone=req_limit_per_ip:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # lua config
    lua_package_path '/opt/app/?.lua;;';
    lua_shared_dict discovery 10m;
    lua_shared_dict jwks 10m;
    lua_shared_dict _internal 1m;
    lua_need_request_body on;
    lua_ssl_verify_depth 3;

    # default upstreams (fallbacks / keepalive)
    upstream default_model_backend {
        server 10.xx.xx.xx:20030 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    upstream api_v3_backend {
        server 10.xx.xx.xx:8080 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;
        charset utf-8;

	set $upstream "";
        # Emphasize simplicity
        set $valid_api_keys "sk-xxx,sk-yyy,sk-yyy";

	access_log /usr/local/openresty/nginx/logs/access.log combined;

        root /usr/local/openresty/nginx/html;

        # static html caching (example)
        location ~ ^/.+\.html$ {
            try_files $uri =404;
            expires 1h;
            add_header Cache-Control "public";
        }

        location /v1 {
            access_by_lua_block {
                local cjson = require "cjson.safe"

                -------------------------------------------------
                -- 1) API Key Authentication
                -------------------------------------------------
                local keys_raw = ngx.var.valid_api_keys or ""
                local valid_keys = {}

                for k in string.gmatch(keys_raw, "([^,]+)") do
                    valid_keys[k] = true
                end

                local headers = ngx.req.get_headers()
                local auth = headers["Authorization"]

                if not auth then
                    ngx.status = ngx.HTTP_UNAUTHORIZED
                    ngx.print('{"error":"Missing Authorization header"}')
                    return ngx.exit(ngx.HTTP_UNAUTHORIZED)
                end

                local _, _, api_key = string.find(auth, "Bearer%s+(.+)")
                if not api_key or not valid_keys[api_key] then
                    ngx.status = ngx.HTTP_FORBIDDEN
                    ngx.print('{"error":"Invalid API Key"}')
                    return ngx.exit(ngx.HTTP_FORBIDDEN)
                end

                ngx.req.set_header("Authorization", auth)

                -------------------------------------------------
                -- 2) Preset OPENAI-PODELS
                -------------------------------------------------
                local OPENAI_MODELS = {
                    ["gpt-oss-20b"] = {
                        model = "Qwen3-0.6B",
                        host  = "10.xx.xx.xx:7306"
                    },
                    ["text-embedding-ada-002"] = {
                        model = "Qwen3-Embedding-0.6B",
                        host  = "10.xx.xx.xx:5006"
                    }
                }

                -------------------------------------------------
                -- 3) Read the body and perform model routing+rewrite the model
                -------------------------------------------------
                ngx.req.read_body()
                local body = ngx.req.get_body_data()

                local upstream_host = nil

                if ngx.req.get_method() == "POST" and body then
                    local decoded, err = cjson.decode(body)

                    if not decoded then
                        ngx.log(ngx.ERR, "Invalid JSON body: ", err)
                        return ngx.exit(ngx.HTTP_BAD_REQUEST)
                    end

                    local req_model = decoded["model"]

                    if req_model and OPENAI_MODELS[req_model] then
                        local m = OPENAI_MODELS[req_model]

                        -- Change 'Client Model Name' to 'Real Model Name'
                        decoded["model"] = m.model

                        -- Optional: gpt-oss-20b reasoning logic
                        if m.model == "gpt-oss-20b" and decoded["reasoning"] == nil then
                            decoded["reasoning"] = { effort = "low" }
                        end

                        local new_body = cjson.encode(decoded)
                        ngx.req.set_body_data(new_body)
                        ngx.req.set_header("Content-Length", tostring(#new_body))

                        upstream_host = m.host
                    else
                        ngx.log(ngx.WARN, "Model not found: ", tostring(req_model))
                    end
                end

                -------------------------------------------------
                -- 4) Bottom line routing
                -------------------------------------------------
                if not upstream_host then
                    upstream_host = "10.xx.xx.xx:7306"
                end

                ngx.var.upstream = upstream_host
            }

            proxy_pass_request_headers on;
            proxy_set_header Host $host;
            proxy_set_header Connection $http_connection;
            proxy_set_header Upgrade $http_upgrade;

            proxy_buffering off;          # LLM scene suggested to be closed
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 5s;
            proxy_pass http://$upstream;
        }

        location /v3/ {
            access_by_lua_block {
                local keys_raw = ngx.var.valid_api_keys or ""
                local valid_keys = {}

                for k in string.gmatch(keys_raw, "([^,]+)") do
                    valid_keys[k] = true
                end

                local headers = ngx.req.get_headers()
                local auth = headers["Authorization"]

                if not auth then
                    ngx.status = ngx.HTTP_UNAUTHORIZED
                    ngx.say('{"error":"Missing Authorization header"}')
                    return ngx.exit(ngx.HTTP_UNAUTHORIZED)
                end

                local _, _, api_key = string.find(auth, "Bearer%s+(.+)")
                if not api_key or not valid_keys[api_key] then
                    ngx.status = ngx.HTTP_FORBIDDEN
                    ngx.say('{"error":"Invalid API Key"}')
                    return ngx.exit(ngx.HTTP_FORBIDDEN)
                end

                ngx.req.set_header("Authorization", auth)
                ngx.req.set_header("X-Real-IP", ngx.var.remote_addr)
                ngx.req.set_header(
                    "X-Forwarded-For",
                    ngx.var.http_x_forwarded_for or ngx.var.remote_addr
                )
                ngx.req.set_header("X-Forwarded-Proto", ngx.var.scheme)
            }

            proxy_pass_request_headers on;
            proxy_set_header Host $host;
            proxy_set_header Connection $http_connection;
            proxy_set_header Upgrade $http_upgrade;

            proxy_buffering on;
            proxy_buffers 4 256k;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_connect_timeout 5s;

            proxy_pass http://api_v3_backend;
        }

        # fallback: deny everything else
        location / {
            return 403 '{"error":"forbidden"}';
        }
    } # server
} # http

