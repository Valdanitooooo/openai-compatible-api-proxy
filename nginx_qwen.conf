user  root;
worker_processes  auto;
worker_rlimit_nofile  65535;

pid /usr/local/openresty/nginx/logs/nginx.pid;
error_log /usr/local/openresty/nginx/logs/error.log warn;

events {
    worker_connections  65535;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server_tokens off;                    # do not expose nginx version
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # client / proxy tuning
    client_max_body_size 20m;
    client_body_buffer_size 10m;

    proxy_http_version 1.1;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    proxy_request_buffering on;           # enable or disable depending on backend needs
    proxy_set_header Connection "";       # let lua/proxy_set_header override for websockets
    proxy_set_header Proxy "";

    # resolver for upstream hostnames (if you use DNS)
    resolver 8.8.8.8 valid=30s;
    resolver_timeout 5s;

    # gzip
    gzip on;
    gzip_http_version 1.1;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # security headers (tweak as needed; HSTS only when using TLS)
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # rate limiting + connection limiting (basic)
    limit_req_zone $binary_remote_addr zone=req_limit_per_ip:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Lua config
    lua_package_path '/opt/app/?.lua;;';
    lua_shared_dict discovery 10m;
    lua_shared_dict jwks 10m;
    lua_shared_dict _internal 1m;
    lua_need_request_body on;
    lua_ssl_verify_depth 3;

    upstream api_v3_backend {
        server 10.xx.xx.xx:3535 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    upstream qwen_moe_backend {
        least_conn;
        server 10.xx.xx.xx:3535 max_fails=1 fail_timeout=2s;
        server 10.yy.yy.yy:3535 max_fails=1 fail_timeout=2s;
        server 10.xx.xx.xx:13535 max_fails=1 fail_timeout=2s;
        server 10.yy.yy.yy:13535 max_fails=1 fail_timeout=2s;
        keepalive 32;
    }

    upstream qwen_emb_backend {
        least_conn;
        server 10.yy.yy.yy:3004 max_fails=1 fail_timeout=2s;
        server 10.xx.xx.xx:3004 max_fails=1 fail_timeout=2s;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;
        charset utf-8;

        set $upstream "";
        # Keep configuration simple
        set $valid_api_keys "sk-xxx,sk-yyy,sk-yyy";

        access_log /usr/local/openresty/nginx/logs/access.log combined;

        root /usr/local/openresty/nginx/html;

        # Static HTML caching example
        location ~ ^/.+\.html$ {
            try_files $uri =404;
            expires 1h;
            add_header Cache-Control "public";
        }

        location /v1 {
            access_by_lua_block {
                local cjson = require "cjson.safe"

                -------------------------------------------------
                -- 1) API key authentication
                -------------------------------------------------
                local keys_raw = ngx.var.valid_api_keys or ""
                local valid_keys = {}

                for k in string.gmatch(keys_raw, "([^,]+)") do
                    valid_keys[k] = true
                end

                local headers = ngx.req.get_headers()
                local auth = headers["Authorization"]

                if not auth then
                    ngx.status = ngx.HTTP_UNAUTHORIZED
                    ngx.say('{"error":"Missing Authorization header"}')
                    return ngx.exit(ngx.HTTP_UNAUTHORIZED)
                end

                local _, _, api_key = string.find(auth, "Bearer%s+(.+)")
                if not api_key or not valid_keys[api_key] then
                    ngx.status = ngx.HTTP_FORBIDDEN
                    ngx.say('{"error":"Invalid API Key"}')
                    return ngx.exit(ngx.HTTP_FORBIDDEN)
                end

                ngx.req.set_header("Authorization", auth)

                -------------------------------------------------
                -- 2) Preset OpenAI models
                -------------------------------------------------
                local OPENAI_MODELS = {
                    ["qwen-moe-instruct"] = {
                        model = "Qwen3.5-35B-A3B",
                        host  = "qwen_moe_backend"
                    },
                    ["qwen-moe-thinking"] = {
                        model = "Qwen3.5-35B-A3B",
                        host  = "qwen_moe_backend"
                    },
                    ["Qwen3.5-35B-A3B"] = {
                        model = "Qwen3.5-35B-A3B",
                        host  = "qwen_moe_backend"
                    },
                    ["Qwen3-Embedding-4B"] = {
                        model = "Qwen3-Embedding-4B",
                        host  = "qwen_emb_backend"
                    }
                }

                -------------------------------------------------
                -- 3) Read the body, route the model, and rewrite the model field
                -------------------------------------------------

                local upstream_host = nil

                if ngx.req.get_method() == "POST" then
                    -- If the client compresses the request body with gzip, the client must disable it;
                    -- this Lua code does not attempt to decompress it.
                    if headers["Content-Encoding"] and headers["Content-Encoding"]:lower():find("gzip") then
                        ngx.log(ngx.ERR, "request body is gzip-compressed; this proxy does not auto-decompress. Rejecting.")
                        ngx.status = 415
                        ngx.say('{"error":"Unsupported Content-Encoding: gzip - please send uncompressed JSON"}')
                        return ngx.exit(415)
                    end

                    ngx.req.read_body()

                    -- Try reading from memory first
                    local body = ngx.req.get_body_data()

                    -- If the body is stored in a temporary file, read it from disk
                    if not body then
                        local body_file = ngx.req.get_body_file()
                        if body_file then
                            local f, ferr = io.open(body_file, "rb")
                            if not f then
                                ngx.log(ngx.ERR, "open body file failed: ", tostring(ferr))
                                return ngx.exit(400)
                            end
                            body = f:read("*a")
                            f:close()
                        end
                    end

                    if not body then
                        ngx.log(ngx.ERR, "failed to read request body (both memory and tmp file nil)")
                        return ngx.exit(400)
                    end

                    -- Parse JSON
                    local decoded, err = cjson.decode(body)
                    if not decoded then
                        ngx.log(ngx.ERR, "Invalid JSON body: ", tostring(err))
                        return ngx.exit(ngx.HTTP_BAD_REQUEST)
                    end

                    -- Support multiple structures for model selection
                    local req_model = decoded.model or (decoded.request and decoded.request.model) or decoded["model"]
                    ngx.log(ngx.NOTICE, "REQ_MODEL=", tostring(req_model))

                    -- Record the model source (root or request) so chat_template_kwargs can be updated in the correct place
                    local model_source = nil
                    if decoded.model ~= nil then
                        model_source = "root"
                    elseif decoded.request and decoded.request.model ~= nil then
                        model_source = "request"
                    end

                    if req_model and OPENAI_MODELS[req_model] then
                        local m = OPENAI_MODELS[req_model]
                        local real_model = m.model

                        -- For Qwen3.5-series models, apply fine-grained chat_template_kwargs handling
                        if real_model and real_model:find("Qwen3", 1, true) then
                            local is_instruct_model = false
                            if req_model and req_model:find("nstruct", 1, true) then
                                is_instruct_model = true
                            end

                            -- Target object: modify decoded.request first if the model comes from request, otherwise modify root
                            local target_tbl = nil
                            if model_source == "request" then
                                target_tbl = decoded.request
                            else
                                target_tbl = decoded
                            end

                            -- Helper: ensure chat_template_kwargs is a table
                            local ctk = nil
                            if type(target_tbl.chat_template_kwargs) == "table" then
                                ctk = target_tbl.chat_template_kwargs
                            elseif target_tbl.chat_template_kwargs == nil then
                                -- For thinking mode: if absent, do nothing (default remains thinking mode)
                                if is_instruct_model then
                                    -- For instruct mode: create chat_template_kwargs and set enable_thinking = false
                                    target_tbl.chat_template_kwargs = { enable_thinking = false }
                                    ngx.log(ngx.NOTICE, "Added chat_template_kwargs.enable_thinking=false for qwen-moe-instruct")
                                else
                                    -- Thinking mode and chat_template_kwargs absent: no-op by design
                                    ngx.log(ngx.NOTICE, "chat_template_kwargs not present for qwen-moe-thinking; leaving as default (no-op)")
                                end
                            else
                                -- chat_template_kwargs exists but is not a table (abnormal); overwrite conservatively
                                if is_instruct_model then
                                    target_tbl.chat_template_kwargs = { enable_thinking = false }
                                    ngx.log(ngx.ERR, "chat_template_kwargs is not a table; overwrote with {enable_thinking=false} for qwen-moe-instruct")
                                else
                                    ngx.log(ngx.ERR, "chat_template_kwargs is not a table; leaving as-is for qwen-moe-thinking")
                                end
                            end

                            -- If ctk is already a table, only update enable_thinking and preserve other fields
                            if ctk then
                                if not is_instruct_model then
                                    -- If enable_thinking exists, set it to true; otherwise do not add it
                                    if ctk.enable_thinking ~= nil then
                                        ctk.enable_thinking = true
                                        ngx.log(ngx.NOTICE, "Set chat_template_kwargs.enable_thinking=true for qwen-moe-thinking")
                                    else
                                        ngx.log(ngx.NOTICE, "chat_template_kwargs present but no enable_thinking; leaving other params unchanged for qwen-moe-thinking")
                                    end
                                else
                                    -- For instruct mode: if enable_thinking exists, set it to false; otherwise add enable_thinking=false
                                    ctk.enable_thinking = false
                                    ngx.log(ngx.NOTICE, "Ensured chat_template_kwargs.enable_thinking=false for qwen-moe-instruct (preserved other keys)")
                                end
                            end
                        end

                        -- If the request model matches an OPENAI_MODELS mapping, replace model and set upstream
                        -- Rewrite to the real backend model name
                        decoded.model = real_model
                        local new_body = require("cjson").encode(decoded)
                        ngx.req.set_body_data(new_body)
                        ngx.req.set_header("Content-Length", tostring(#new_body))
                        upstream_host = m.host
                    else
                        ngx.log(ngx.WARN, "Model not found or empty: ", tostring(req_model))
                    end
                end

                -------------------------------------------------
                -- 4) Final routing
                -------------------------------------------------
                if not upstream_host then
                    upstream_host = "qwen_moe_backend"
                end

                ngx.var.upstream = upstream_host
            }

            proxy_pass_request_headers on;
            proxy_set_header Host $http_host;
            proxy_set_header Connection $http_connection;
            proxy_set_header Upgrade $http_upgrade;
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;

            proxy_buffering off;          # recommended to disable for LLM workloads
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 3s;
            proxy_connect_timeout 1s;
            proxy_pass http://$upstream;
        }
        # Normal API proxy
        location /v3/ {
            access_by_lua_block {
                local keys_raw = ngx.var.valid_api_keys or ""
                local valid_keys = {}

                for k in string.gmatch(keys_raw, "([^,]+)") do
                    valid_keys[k] = true
                end

                local headers = ngx.req.get_headers()
                local auth = headers["Authorization"]

                if not auth then
                    ngx.status = ngx.HTTP_UNAUTHORIZED
                    ngx.say('{"error":"Missing Authorization header"}')
                    return ngx.exit(ngx.HTTP_UNAUTHORIZED)
                end

                local _, _, api_key = string.find(auth, "Bearer%s+(.+)")
                if not api_key or not valid_keys[api_key] then
                    ngx.status = ngx.HTTP_FORBIDDEN
                    ngx.say('{"error":"Invalid API Key"}')
                    return ngx.exit(ngx.HTTP_FORBIDDEN)
                end

                ngx.req.set_header("Authorization", auth)
                ngx.req.set_header("X-Real-IP", ngx.var.remote_addr)
                ngx.req.set_header(
                    "X-Forwarded-For",
                    ngx.var.http_x_forwarded_for or ngx.var.remote_addr
                )
                ngx.req.set_header("X-Forwarded-Proto", ngx.var.scheme)
            }

            proxy_pass_request_headers on;
            proxy_set_header Host $http_host;
            proxy_set_header Connection $http_connection;
            proxy_set_header Upgrade $http_upgrade;

            proxy_buffering on;
            proxy_buffers 4 256k;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_connect_timeout 5s;

            proxy_pass http://api_v3_backend;
        }

        # Fallback: deny everything else
        location / {
            return 403 '{"error":"forbidden"}';
        }
    } # server
} # http